## Compose desplegado en la EC2 de "Perfil Empresa Web".

services:
  app:
    image: ${ECR_EMPRESA_IMAGE}
    container_name: criptoself-empresa
    restart: unless-stopped
    environment:
      EMPRESA_DOMAIN: ${EMPRESA_DOMAIN}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Renderiza el template explicitamente: el entrypoint nginx oficial solo
    # corre envsubst si el CMD empieza con "nginx", y este wrapper empieza con sh.
    command: >
      /bin/sh -c "envsubst '$$EMPRESA_DOMAIN $$BACKEND_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && (while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;')"

  certbot:
    image: certbot/certbot:latest
    container_name: criptoself-empresa-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
