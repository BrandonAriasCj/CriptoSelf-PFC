## Compose desplegado en la EC2 de "Perfil Usuario Web".
## La imagen ya contiene el build estatico de Vite + nginx base.
## El default.conf.template se monta para configurar SPA fallback + HTTPS.

services:
  app:
    image: ${ECR_USUARIO_IMAGE}
    container_name: criptoself-usuario
    restart: unless-stopped
    depends_on: []
    environment:
      USUARIO_DOMAIN: ${USUARIO_DOMAIN}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Renderiza el template explicitamente: el entrypoint nginx oficial solo
    # corre envsubst si el CMD empieza con "nginx", y este wrapper empieza con sh.
    command: >
      /bin/sh -c "envsubst '$$USUARIO_DOMAIN $$BACKEND_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && (while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;')"

  certbot:
    image: certbot/certbot:latest
    container_name: criptoself-usuario-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
